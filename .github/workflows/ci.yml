name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install lint dependencies
        run: brew install swift-format

      - name: Lint
        run: make lint

      - name: Test
        run: make test
